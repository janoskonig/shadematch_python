services:
  - type: web
    name: shadematch-python
    runtime: python
    plan: free
    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.13
      - key: PIP_NO_CACHE_DIR
        value: "1"
