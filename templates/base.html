<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#F8F6F3">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}">
    <title>{% block title %}ShadeMatch{% endblock %}</title>
    <meta name="description" content="Mix five pigments to match a target shade, scored by real colour science. Every round contributes to Semmelweis University's colour-vision research.">
    <meta property="og:site_name" content="ShadeMatch">
    <meta property="og:title" content="ShadeMatch — match real paint colours">
    <meta property="og:description" content="Mix five pigments to match a target shade, scored by real colour science. Can you beat ΔE 1?">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ request.url_root if request else 'https://shadematch.app/' }}">
    <meta property="og:image" content="{{ url_for('static', filename='icons/icon-512.png', _external=True) if request else '' }}">
    <meta name="twitter:card" content="summary">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}?v=20260508d">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}?v=20260508d">
    <link rel="stylesheet" href="{{ url_for('static', filename='cookie-consent.css') }}?v=20260508d">

    {% block extra_css %}{% endblock %}
    {% block extra_head %}{% endblock %}
</head>
<body>
    <script>
    (function () {
      var CURRENT = {{ client_storage_version|tojson }};
      var KEY = 'sm_client_storage_version';
      function clearAllCookies() {
        var secure = location.protocol === 'https:' ? ';Secure' : '';
        var raw = document.cookie ? document.cookie.split(';') : [];
        for (var i = 0; i < raw.length; i++) {
          var name = raw[i].split('=')[0].trim();
          if (!name) continue;
          document.cookie = name + '=;Max-Age=0;path=/;SameSite=Lax' + secure;
        }
      }
      try {
        if (localStorage.getItem(KEY) !== String(CURRENT)) {
          try { sessionStorage.clear(); } catch (e1) {}
          try { localStorage.clear(); } catch (e2) {}
          clearAllCookies();
          localStorage.setItem(KEY, String(CURRENT));
        }
      } catch (e) { /* private mode / blocked storage */ }
    })();
    </script>
    {% block content %}{% endblock %}

    <script src="{{ url_for('static', filename='cookie-consent.js') }}"></script>
    {% block extra_js %}{% endblock %}

    <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(function (reg) {
            window.__swRegistration = reg;
          })
          .catch(function (err) {
            console.warn('Service worker registration failed:', err);
          });
      });
    }
    </script>
</body>
</html>
