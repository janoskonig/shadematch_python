{% extends "base.html" %}

{% block title %}ShadeMatch — Color Mixing{% endblock %}

{% block head %}
<style>
  *, *::before, *::after { box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 16px;
    min-height: 100vh;
    min-height: 100dvh;
    background: #fafafa;
    color: #222;
  }

  h1 {
    font-size: 1.5rem;
    margin: 0.5em 0;
  }

  /* --- Color display row --- */
  .color-display-row {
    display: flex;
    justify-content: center;
    gap: 32px;
    width: 100%;
    max-width: 600px;
    min-width: 0;
  }

  .color-display-col {
    flex: 1 1 0;
    min-width: 0;
    text-align: center;
  }

  .color-display-col h3 {
    font-size: 0.95rem;
    margin: 0 0 8px;
  }

  .color-box {
    width: 100%;
    aspect-ratio: 1 / 1;
    max-width: 200px;
    margin: 0 auto;
    border: 2px solid #333;
    border-radius: 8px;
  }

  /* --- Palette --- */
  #palette {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    row-gap: 12px;
    column-gap: 10px;
    margin-top: 20px;
    width: 100%;
    max-width: 600px;
  }

  .color-control {
    display: flex;
    flex-direction: column;
    align-items: center;
    touch-action: manipulation;
  }

  .color-circle {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-weight: bold;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    transition: transform 0.1s ease;
  }

  .color-circle:active {
    transform: scale(0.92);
  }

  .minus-button {
    margin-top: 6px;
    font-size: 18px;
    width: 32px;
    height: 32px;
    padding: 0;
    border: none;
    background: #ddd;
    border-radius: 50%;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .minus-button:active {
    background: #bbb;
  }

  /* --- Stats & controls --- */
  #stats {
    margin-top: 16px;
    font-size: 0.95rem;
  }

  #controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-top: 16px;
    width: 100%;
    max-width: 600px;
  }

  #controls button, #exportBtn {
    padding: 10px 18px;
    font-size: 0.95rem;
    border: 1px solid #bbb;
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    min-height: 44px;
  }

  #controls button:disabled {
    opacity: 0.45;
    cursor: default;
  }

  #controls button:not(:disabled):active, #exportBtn:active {
    background: #eee;
  }

  .timer-line {
    margin-top: 12px;
    font-size: 0.95rem;
  }

  #exportBtn {
    margin-top: 12px;
  }

  /* --- Hover tooltips: only for fine pointer devices --- */
  @media (hover: hover) and (pointer: fine) {
    .color-circle:hover {
      transform: scale(1.1);
    }
    .minus-button:hover {
      background: #c0c0c0;
    }
  }

  /* --- Mobile breakpoint --- */
  @media (max-width: 768px) {
    body {
      padding: 12px 8px;
    }

    h1 {
      font-size: 1.25rem;
    }

    .color-display-row {
      gap: 16px;
    }
  }

  @media (max-width: 480px) {
    .color-display-row {
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .color-box {
      max-width: 160px;
    }

    .color-circle {
      width: 44px;
      height: 44px;
      font-size: 0.9rem;
    }

    #controls button, #exportBtn {
      padding: 10px 14px;
      font-size: 0.875rem;
    }
  }
</style>

<script src="{{ url_for('static', filename='mixbox.js') }}"></script>
<script type="module" src="{{ url_for('static', filename='main.js') }}"></script>
{% endblock %}

{% block body %}
<h1>Color Mixing App</h1>

<div class="color-display-row">
  <div class="color-display-col">
    <h3>Target Color</h3>
    <div id="targetColor" class="color-box"></div>
  </div>
  <div class="color-display-col">
    <h3>Current Mix</h3>
    <div id="currentMix" class="color-box"></div>
  </div>
</div>

<div id="palette">
  <div class="color-control">
    <div class="color-circle" data-color="white" style="background: white; color: black;">0</div>
    <button class="minus-button" data-color="white">&minus;</button>
  </div>
  <div class="color-control">
    <div class="color-circle" data-color="black" style="background: black;">0</div>
    <button class="minus-button" data-color="black">&minus;</button>
  </div>
  <div class="color-control">
    <div class="color-circle" data-color="red" style="background: red;">0</div>
    <button class="minus-button" data-color="red">&minus;</button>
  </div>
  <div class="color-control">
    <div class="color-circle" data-color="yellow" style="background: yellow; color: black;">0</div>
    <button class="minus-button" data-color="yellow">&minus;</button>
  </div>
  <div class="color-control">
    <div class="color-circle" data-color="blue" style="background: blue;">0</div>
    <button class="minus-button" data-color="blue">&minus;</button>
  </div>
</div>

<div id="stats">
  <p>&Delta;E (CIEDE2000): <span id="deltaE">-</span></p>
</div>

<div id="controls">
  <button id="startBtn">Start</button>
  <button id="stopBtn" disabled>Stop</button>
  <button id="skipBtn" disabled>Skip</button>
  <button id="restartBtn" disabled>Restart</button>
  <button id="retryBtn" disabled>Retry</button>
</div>

<p class="timer-line">&#9201; Time: <span id="timer">0.0</span> sec</p>
<button id="exportBtn">Download CSV</button>
{% endblock %}
