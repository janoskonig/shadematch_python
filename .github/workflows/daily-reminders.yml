name: Daily reminders

# Triggers /push/send-daily on production, which sends web-push notifications
# to every row in push_subscriptions and reminder emails to opted-in,
# email-verified users. Requires the PUSH_CRON_SECRET repository secret to
# match the PUSH_CRON_SECRET env var on the server.

on:
  schedule:
    # 08:00 UTC = 10:00 Budapest (CEST) — adjust as needed.
    - cron: '0 8 * * *'
  workflow_dispatch: {}

jobs:
  send-daily-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily push + email reminders
        run: |
          curl -sS --fail-with-body -X POST \
            "https://shadestudy.com/push/send-daily" \
            -H "X-Cron-Secret: ${{ secrets.PUSH_CRON_SECRET }}" \
            -w '\nHTTP %{http_code}\n'
